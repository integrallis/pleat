name: CI
on: [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable
          components: clippy, rustfmt
      - name: Format check
        run: cargo fmt --check
      - name: Clippy (all features, deny warnings)
        run: cargo clippy --all-features --all-targets --locked -- -D warnings
      - name: Clippy (no default features, deny warnings)
        run: cargo clippy --no-default-features --all-targets --locked -- -D warnings
      - name: Test (all features)
        run: cargo test --all-features --locked
      - name: Test (no default features)
        run: cargo test --no-default-features --locked
      - name: Doc (deny warnings)
        run: cargo doc --no-deps --all-features --locked
        env:
          RUSTDOCFLAGS: -D warnings

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.87.0
      - name: Build on MSRV (1.87)
        run: cargo build --all-features --locked

  i686:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable
          targets: i686-unknown-linux-musl
      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Test 32-bit decode and query paths
        run: cargo test --target i686-unknown-linux-musl --all-features --locked
        env:
          RUSTFLAGS: -C linker=rust-lld

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          arguments: --all-features

  coverage-and-benches:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable
          components: llvm-tools
      - name: Install pinned coverage driver
        run: cargo install cargo-llvm-cov --version 0.6.17 --locked
      - name: Enforce at least 90% line coverage
        run: cargo llvm-cov --all-features --workspace --locked --fail-under-lines 90
      - name: Compile every benchmark target
        run: cargo bench --all-features --no-run --locked

  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: nightly
          components: miri
      - name: Interpret serialization and batch-query safety tests
        run: cargo miri test --all-features miri_tests --locked

  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: nightly
          components: rust-src
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --version 0.13.2 --locked
      - name: Fuzz decode (30s, must find no crashes)
        run: cargo fuzz run decode -- -max_total_time=30
      - name: Fuzz roundtrip (30s, must find no crashes)
        run: cargo fuzz run roundtrip -- -max_total_time=30
