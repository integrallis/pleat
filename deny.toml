[advisories]
unmaintained = "workspace"
yanked = "deny"

[licenses]
confidence-threshold = 0.93
allow = [
  "Apache-2.0",
  "BSL-1.0",
  "MIT",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
